<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Route Visualizer</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; background: #f0f0f0; }
        #time-slider { cursor: none; } 
        
        .leaflet-popup-content-wrapper { border-radius: 8px; }
        .route-icon-marker { filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.4)); z-index: 1000 !important; }

        #controls {
            position: absolute; top: 10px; right: 10px; z-index: 2000; 
            background: white; padding: 10px; border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.3); width: 240px;
        }
        .btn-group { margin-top: 10px; display: flex; gap: 4px; }
        button { flex: 1; padding: 5px; cursor: pointer; border: 1px solid #ddd; border-radius: 3px; background: #f8f8f8; font-size: 12px; color: #444; }
        button:hover { background: #efefef; }
        #recording-status { color: #d00; font-size: 10px; font-weight: bold; display: none; margin-top: 4px; text-align: center; }
    </style>
</head>
<body>

<div id="controls">
    <div style="margin-bottom: 10px;">
        <strong>Time: </strong><span id="time-display">12:00:00</span>
    </div>
    <input type="range" id="time-slider" min="0" max="86399" value="43200" style="width: 100%;">
    <div style="display: flex; justify-content: space-between; font-size: 10px; color: #666; margin-top: 5px;">
        <span>00:00</span><span>06:00</span><span>12:00</span><span>18:00</span><span>23:59</span>
    </div>

    <div class="btn-group">
        <button id="play-pause-btn" onclick="autoPlay.toggle()"><i class="fas fa-pause"></i></button>
        <button onclick="recorder.start()"><i class="fas fa-circle" style="color:red"></i> Record</button>
        <button onclick="recorder.stop()"><i class="fas fa-save"></i> Save</button>
    </div>
    <div id="recording-status">● RECORDING</div>
</div>

<div id="map"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

<script>
    const map = L.map('map').setView([44.319603, 23.801761], 14);
    
    map.createPane('routePane');
    map.getPane('routePane').style.zIndex = 400;
    map.createPane('stopPane');
    map.getPane('stopPane').style.zIndex = 500;

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    const busMarkers = {};
    let shapesData, schedules, colorData, stopsData;

    const stopIcon = L.icon({
        iconUrl: 'icons/bus-stop.png',
        iconSize: [18, 18],
        iconAnchor: [9, 9],
        popupAnchor: [0, -10]
    });

    Promise.all([
        fetch('route_colors.json').then(res => res.json()),
        fetch('gtfs_shapes.geojson').then(res => res.json()),
        fetch('bus_schedules.json').then(res => res.json()),
        fetch('gtfs_stops.geojson').then(res => res.json())
    ]).then(([colors, shapes, scheds, stops]) => {
        colorData = colors;
        shapesData = shapes;
        schedules = scheds;
        stopsData = stops;

        L.geoJSON(shapesData, {
            pane: 'routePane',
            style: (feature) => {
                const sId = feature.properties.shape_id;
                return { color: colorData[sId]?.color || "#3388ff", weight: 5, opacity: 0.6 };
            },
            onEachFeature: (feature, layer) => {
                const sId = feature.properties.shape_id;
                const routeName = colorData[sId]?.route_name || "Unknown";
                layer.bindPopup(`<strong>Route: ${routeName}</strong><br>ID: ${sId}`);
            }
        }).addTo(map);

        L.geoJSON(stopsData, {
            pane: 'stopPane',
            pointToLayer: (feature, latlng) => {
                return L.marker(latlng, { icon: stopIcon });
            },
            onEachFeature: (feature, layer) => {
                layer.bindPopup(`<strong>Stop:</strong> ${feature.properties.stop_name}<br>ID: ${feature.properties.stop_id}`);
            }
        }).addTo(map);

        updateBuses(); 
        autoPlay.start(); 
    }).catch(err => console.error(err));

    const slider = document.getElementById('time-slider');
    const timeDisplay = document.getElementById('time-display');

    function secondsToTime(s) { return new Date(s * 1000).toISOString().substr(11, 8); }
    function timeToSeconds(t) { const [h, m, s] = t.split(':').map(Number); return h * 3600 + m * 60 + s; }

    function updateBuses() {
        if (!schedules || !shapesData) return;
        const currentSeconds = parseInt(slider.value);
        timeDisplay.innerText = secondsToTime(currentSeconds);

        schedules.forEach(trip => {
            const start = timeToSeconds(trip.start_time);
            const end = timeToSeconds(trip.end_time);

            if (currentSeconds >= start && currentSeconds <= end) {
                const progress = (currentSeconds - start) / (end - start);
                const shape = shapesData.features.find(f => f.properties.shape_id === trip.shape_id);
                
                if (shape) {
                    const coords = shape.geometry.coordinates;
                    const index = Math.floor(progress * (coords.length - 1));
                    const pos = coords[index];

                    if (!busMarkers[trip.trip_id]) {
                        const icon = L.icon({
                            iconUrl: `icons/route_icon_${trip.route_short_name.toLowerCase()}.png`,
                            iconSize: [30, 30],
                            iconAnchor: [15, 15],
                            className: 'route-icon-marker'
                        });
                        busMarkers[trip.trip_id] = L.marker([pos[1], pos[0]], {icon: icon})
                            .addTo(map)
                            .bindTooltip(`Bus ${trip.route_short_name}`);
                    } else {
                        busMarkers[trip.trip_id].setLatLng([pos[1], pos[0]]);
                    }
                }
            } else if (busMarkers[trip.trip_id]) {
                map.removeLayer(busMarkers[trip.trip_id]);
                delete busMarkers[trip.trip_id];
            }
        });
    }

    slider.addEventListener('input', updateBuses);

    const autoPlay = {
        active: false, speedMultiplier: 30, lastTimestamp: 0,
        toggle() { this.active ? this.stop() : this.start(); },
        start() {
            if (this.active) return;
            this.active = true;
            this.lastTimestamp = performance.now();
            document.getElementById('play-pause-btn').innerHTML = '<i class="fas fa-pause"></i>';
            requestAnimationFrame(this.step.bind(this));
        },
        stop() {
            this.active = false;
            document.getElementById('play-pause-btn').innerHTML = '<i class="fas fa-play"></i>';
        },
        step(timestamp) {
            if (!this.active) return;
            const delta = (timestamp - this.lastTimestamp) / 1000;
            this.lastTimestamp = timestamp;
            let val = parseFloat(slider.value) + (delta * this.speedMultiplier);
            slider.value = val > 86399 ? 0 : val;
            updateBuses();
            requestAnimationFrame(this.step.bind(this));
        }
    };

    const recorder = {
        mediaRecorder: null, chunks: [],
        async start() {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: { frameRate: 30 }, audio: false });
                this.chunks = [];
                this.mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
                this.mediaRecorder.ondataavailable = e => this.chunks.push(e.data);
                this.mediaRecorder.onstop = () => {
                    const blob = new Blob(this.chunks, { type: 'video/webm' });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = 'bus-visualization.webm';
                    a.click();
                    document.getElementById('recording-status').style.display = 'none';
                    stream.getTracks().forEach(t => t.stop());
                };
                this.mediaRecorder.start();
                document.getElementById('recording-status').style.display = 'block';
            } catch (e) { console.error(e); }
        },
        stop() { if(this.mediaRecorder) this.mediaRecorder.stop(); }
    };
</script>

</body>
</html>
