<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitFlow</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="controls">
    <div class="time-container">
        <strong>Time: </strong><span id="time-display">12:00:00</span>
    </div>

    <input type="range" id="time-slider" min="0" max="86399" value="43200">
    <div class="slider-labels">
        <span>00:00</span><span>06:00</span><span>12:00</span><span>18:00</span><span>23:59</span>
    </div>

    <div class="btn-group">
        <button id="play-pause-btn" onclick="autoPlay.toggle()" title="Play/Pause">
            <i class="fas fa-pause"></i>
        </button>
        <button onclick="recorder.start()" title="Start Recording">
            <i class="fas fa-circle"></i> Record
        </button>
        <button onclick="recorder.stop()" title="Save Recording">
            <i class="fas fa-save"></i> Save
        </button>
    </div>
    <div id="recording-status">● RECORDING</div>
	
    <div id="search-container">
        <div class="search-header" onclick="toggleSearch()">
            <span>🔍 SEARCH</span>
            <i id="search-chevron" class="fas fa-chevron-down"></i>
        </div>

        <div id="search-content">
            <input type="text" id="stop-search-input" placeholder="Stop name or ID">
            
            <div class="search-params">
                <input type="time" id="search-time-input">
                <input type="number" id="search-window" value="10" min="1" max="60" title="Window (mins)">
            </div>
            
            <button class="btn-find" onclick="searchBusAtStop()">Find</button>
            
            <div id="search-results"></div>
        </div>
    </div>
</div>

<div id="map"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="js/script.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('TransitFlow Cache Active!'))
        .catch(err => console.log('Cache failed:', err));
    });
  }
</script>
</body>
</html>
