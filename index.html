<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransitFlow</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="controls">
    <div class="time-container">
        <label for="time-input"><strong>Time: </strong></label>
        <input type="time" id="time-input" step="1">
    </div>

    <input type="range" id="time-slider" min="0" max="86399">
    
    <div class="slider-labels">
        <span>00:00</span>
        <span>06:00</span>
        <span>12:00</span>
        <span>18:00</span>
        <span>23:59</span>
    </div>

    <div class="btn-group">
        <button id="play-pause-btn" onclick="autoPlay.toggle()" title="Play/Pause">
            <i class="fas fa-pause"></i>
        </button>
        <select id="speed-selector" onchange="autoPlay.setSpeed(this.value)" title="Playback Speed">
            <option value="30" selected>30x</option>
            <option value="60">60x</option>
            <option value="120">120x</option>
        </select>
		<button class="btn-clear" onclick="clearSearch()" title="Clear Search & Selection">
        <i class="fas fa-trash-alt"></i>
		</button>
    </div>
    
    <div id="search-container">
        <div class="search-header" onclick="toggleSearch()">
            <span>🔍 SEARCH</span>
            <i id="search-chevron" class="fas fa-chevron-down"></i>
        </div>

        <div id="search-content">
            <input type="text" id="stop-search-input" placeholder="Stop name or ID">
            
            <div class="search-params">
                <input type="time" id="search-time-input">
                <input type="number" id="search-window" value="10" min="1" max="60" title="Window (mins)">
            </div>
            
            <div class="search-actions">
                <button class="btn-find" onclick="searchBusAtStop()">Find</button>
            </div>
            
            <div id="search-results"></div>
        </div>
    </div>
</div>

<div id="map"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="js/script.js"></script>

<script>
    // Service Worker Registration
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(() => console.log('TransitFlow Cache Active!'))
                .catch(err => console.error('Cache failed:', err));
        });
    }
</script>

</body>
</html>
